/* ─── TOAST SYSTEM ───────────────────────────────── */
let _setToast = null;
function toast(msg, color = C.green) {
  if (_setToast) _setToast({ msg, color, id: Date.now() });
}
function ToastProvider() {
  const [t, setT] = useState(null);
  _setToast = setT;
  useEffect(() => {
    if (!t) return;
    const id = setTimeout(() => setT(null), 3200);
    return () => clearTimeout(id);
  }, [t]);
  if (!t) return null;
  return (
    <div style={{
      position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)",
      background:t.color, color:"#fff", padding:"12px 22px", borderRadius:12,
      fontSize:13, fontWeight:600, zIndex:9999, maxWidth:"90vw", textAlign:"center",
      boxShadow:`0 4px 24px ${t.color}55`, animation:"fadeUp .25s ease",
      whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis"
    }}>{t.msg}</div>
  );
}

function Photo({sector, idx, style, alt}){
  const [imgOk, setImgOk] = useState(false);
  const [tried, setTried] = useState(false);
  const src = photoUrl(sector, idx||0);
  const colors = NICHE_COLORS[sector] || ["#2C3E50","#3498DB","#5DADE2"];
  const icon = NICHE_ICONS[sector] || "📊";
  const seed = (idx||0) % 3;
  const bg = `linear-gradient(135deg, ${colors[seed]} 0%, ${colors[(seed+1)%3]} 100%)`;

  return(
    <div style={{position:"relative",overflow:"hidden",...style}}>
      {/* Always-visible gradient placeholder */}
      <div style={{position:"absolute",inset:0,background:bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:8}}>
        <div style={{fontSize:"clamp(24px,5vw,40px)",lineHeight:1}}>{icon}</div>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.7)",fontWeight:600,textTransform:"uppercase",letterSpacing:".1em",textAlign:"center",padding:"0 8px"}}>{sector}</div>
      </div>
      {/* Try loading real image on top */}
      {!tried && (
        <img
          key={src}
          src={src}
          alt={alt||sector}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block",opacity:imgOk?1:0,transition:"opacity .4s"}}
          onLoad={()=>{setImgOk(true);setTried(true);}}
          onError={()=>setTried(true)}
        />
      )}
      {imgOk && (
        <img
          src={src}
          alt={alt||sector}
          style={{position:"absolute",inset:0,width:"100%",height:"100%",objectFit:"cover",display:"block"}}
        />
      )}
    </div>
  );
}

/* ─── CLAUDE API ─────────────────────────────────── */
async function callClaude(sys, msg, max=900){
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,system:sys,messages:[{role:"user",content:msg}]})
  });
  const d = await r.json();
  return d.content?.[0]?.text||"";
}
async function callClaudeChat(sys, messages, max=400){
  const r = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST", headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,system:sys,messages})
  });
  const d = await r.json();
  return d.content?.[0]?.text||"";
}

/* ─── DALL-E IMAGE GENERATION ───────────────────── */
const OPENAI_KEY = "YOUR_OPENAI_API_KEY_HERE";

async function generateImage(prompt, sector, platform) {
  // GitHub Pages has no sandbox restrictions — direct OpenAI call works fine
  const size = platform === "tiktok" ? "1024x1792"
    : platform === "instagram" ? "1024x1024"
    : "1792x1024";
  try {
    const res = await fetch("https://api.openai.com/v1/images/generations", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer YOUR_OPENAI_API_KEY_HERE"
      },
      body: JSON.stringify({ model:"dall-e-3", prompt, n:1, size, quality:"standard" })
    });
    const d = await res.json();
    if (d.data?.[0]?.url) return { url: d.data[0].url, error: null };
    const msg = d.error?.message || d.error?.code || JSON.stringify(d).slice(0,120);
    return { url: null, error: msg };
  } catch(e) {
    return { url: null, error: "Request failed: " + e.message };
  }
}

function buildImagePrompt(sector, platform, promo, caption) {
  const style = platform === "tiktok"
    ? "vertical portrait format, vibrant, eye-catching, social media style"
    : platform === "instagram"
    ? "square format, aesthetic, high-quality, instagram-worthy"
    : "horizontal landscape format, professional, Facebook ad style";

  const subject = promo
    ? `${sector} business promotion: ${promo}`
    : `${sector} business marketing`;

  return `Professional marketing photo for a ${subject}. ${style}. No text, no words, no logos. Photorealistic, commercial photography quality. ${caption ? "Scene context: " + caption.slice(0,80) : ""}`;
}

/* ─── LEAD AGENT ─────────────────────────────────── */
function LeadsSection({sector}){
  const {customers}=getNicheData(sector);
  const [tab,setTab]=useState("fresh");
  const [profile,setProfile]=useState(null);
  const [activeC,setActiveC]=useState(null);
  const [apiMsgs,setApiMsgs]=useState([]);
  const [displayMsgs,setDisplayMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [typing,setTyping]=useState(false);
  const chatEnd=useRef(null);
  const scroll=()=>setTimeout(()=>chatEnd.current?.scrollIntoView({behavior:"smooth"}),40);

  const openChat=useCallback((c)=>{
    const open=c.type==="fresh"
      ?`Hey ${c.name.split(" ")[0]}! Just saw you were interested in our ${sector} services — reaching out right away. Still looking to get booked in?`
      :`Hey ${c.name.split(" ")[0]}, it's been a while! We've really missed you. What's been keeping you from coming back?`;
    setActiveC(c);setApiMsgs([{role:"assistant",content:open}]);setDisplayMsgs([{role:"agent",text:open}]);setInput("");scroll();
  },[sector]);

  const send=useCallback(async()=>{
    if(!input.trim()||!activeC||typing)return;
    const text=input.trim();setInput("");
    const newD=[...displayMsgs,{role:"user",text}];setDisplayMsgs(newD);
    const newA=[...apiMsgs,{role:"user",content:text}];setApiMsgs(newA);
    setTyping(true);scroll();
    const sys=`You are Maverick, an elite sales agent for a ${sector} business. Talking to ${activeC.name}, a ${activeC.type==="fresh"?"fresh lead — CLOSE this sale NOW, be warm, fast, direct":"cold lead — find their pain point, rebuild trust, re-book them"}. RULES: Reference earlier conversation naturally. Keep replies 2-3 sentences. Sound human. If ready to book, give immediate next steps.`;
    const reply=await callClaudeChat(sys,newA,350);
    setApiMsgs(prev=>[...prev,{role:"assistant",content:reply}]);
    setDisplayMsgs(prev=>[...prev,{role:"agent",text:reply}]);
    setTyping(false);scroll();
  },[input,activeC,apiMsgs,displayMsgs,typing,sector]);

  const filtered=customers.filter(c=>c.type===tab);
  return(
    <div className="fade">
      {profile&&<CustomerProfile customer={profile} sector={sector} onClose={()=>setProfile(null)}/>}
      <SectionHeader title="Lead Agent · Maverick" sub={`Fresh lead response + cold lead revival for ${sector}`}
        action={<div style={{display:"flex",gap:8}}>
          <button className="btn" onClick={()=>setTab("fresh")} style={tab==="fresh"?{borderColor:C.blue,color:C.blue}:{}}>Fresh</button>
          <button className="btn" onClick={()=>setTab("cold")} style={tab==="cold"?{borderColor:C.orange,color:C.orange}:{}}>Cold</button>
        </div>}
      />
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:12,marginBottom:20}}>
        <Stat label="Fresh Today" value="8" sub="2.4 min avg" color={C.blue}/>
        <Stat label="Cold Revived" value="12" sub="this month" color={C.orange}/>
        <Stat label="Deals Closed" value="$3,640" sub="agent-driven" color={C.green}/>
        <Stat label="Connection" value="34%" sub="call outbound"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}}>
        <div className="card">
          <div style={{fontWeight:700,color:C.text,marginBottom:14}}>{tab==="fresh"?"Fresh Ad Leads":"Cold Lead Pipeline"}</div>
          {filtered.map((c,i)=>{
            const mc=c.mood==="Hot"?C.red:c.mood==="Warm"?C.orange:c.mood==="Closed"?C.green:C.muted;
            const active=activeC?.id===c.id;
            return(
              <div key={i} style={{padding:12,marginBottom:8,background:active?C.purple+"0A":C.s2,borderRadius:10,border:`1px solid ${active?C.purple+"44":C.border}`,transition:"all .2s"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,flexWrap:"wrap",gap:5}}>
                  <span style={{fontSize:13,color:C.text,fontWeight:700}}>{c.name}</span>
                  <Tag color={mc}>{c.mood}</Tag>
                </div>
                <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{c.src} · {c.contacts} contacts</div>
                <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
                  <span className="mono" style={{fontSize:12,color:C.green,flex:1}}>{c.val}</span>
                  <button className="btn" style={{fontSize:10,padding:"4px 9px",borderColor:C.purple+"55",color:C.purple}} onClick={()=>setProfile(c)}>Profile</button>
                  <button className="btn" style={{fontSize:10,padding:"4px 9px"}} onClick={()=>openChat(c)}>{tab==="fresh"?"Sell Now":"Re-engage"}</button>
                </div>
              </div>
            );
          })}
        </div>
        <div className="card" style={{display:"flex",flexDirection:"column",minHeight:360}}>
          {activeC?(
            <>
              <div style={{display:"flex",gap:9,alignItems:"center",marginBottom:12,paddingBottom:11,borderBottom:`1px solid ${C.border}`,flexWrap:"wrap"}}>
                <div style={{width:33,height:33,borderRadius:9,background:C.purple+"22",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:14,color:C.purple,flexShrink:0}}>M</div>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:700,color:C.text}}>Maverick → {activeC.name}</div><div style={{fontSize:10,color:C.muted}}>Full conversation memory</div></div>
                <button className="btn" style={{fontSize:10,padding:"4px 9px",borderColor:C.purple+"55",color:C.purple}} onClick={()=>setProfile(activeC)}>Profile</button>
                <button className="btn" style={{fontSize:10,padding:"4px 9px"}} onClick={()=>{setActiveC(null);setApiMsgs([]);setDisplayMsgs([]);}}>Close</button>
              </div>
              <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:9,marginBottom:10,maxHeight:320}}>
                {displayMsgs.map((m,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:7}}>
                    {m.role==="agent"&&<div style={{width:22,height:22,borderRadius:5,background:C.purple+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:C.purple,flexShrink:0,alignSelf:"flex-end"}}>M</div>}
                    <div style={{background:m.role==="user"?C.purple:C.s2,border:m.role==="agent"?`1px solid ${C.border}`:"none",color:C.text,padding:"9px 12px",borderRadius:m.role==="user"?"13px 13px 4px 13px":"13px 13px 13px 4px",fontSize:12,lineHeight:1.55,maxWidth:"82%"}}>{m.text}</div>
                  </div>
                ))}
                {typing&&<div style={{display:"flex",gap:7,alignItems:"center"}}><div style={{width:22,height:22,borderRadius:5,background:C.purple+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:C.purple,flexShrink:0}}>M</div><Spinner size={13} color={C.purple}/><span style={{fontSize:11,color:C.muted}}>Thinking...</span></div>}
                <div ref={chatEnd}/>
              </div>
              <div style={{display:"flex",gap:7,alignItems:"flex-end"}}>
                <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}} placeholder="Reply as prospect..." rows={2}
                  style={{flex:1,background:C.bg,border:`1px solid ${C.borderHi}`,borderRadius:8,padding:"9px 12px",fontSize:12,color:C.text,fontFamily:"'Outfit',sans-serif",outline:"none",resize:"none"}}/>
                <button className="btn-p" onClick={send} disabled={typing||!input.trim()} style={{padding:"9px 16px",flexShrink:0}}>Send</button>
              </div>
            </>
          ):(
            <div style={{textAlign:"center",padding:"52px 16px"}}>
              <div style={{width:44,height:44,borderRadius:12,background:C.purple+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:C.purple,margin:"0 auto 14px"}}>M</div>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:6}}>Maverick is ready</div>
              <div style={{fontSize:12,color:C.muted,lineHeight:1.7}}>Select a lead and click Sell Now or Re-engage.<br/>Profile shows full call logs, transcripts, and message chains.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ─── REVIEWS ────────────────────────────────────── */
function ReviewsSection({sector}){
  const {reviews}=getNicheData(sector);
  const [selected,setSelected]=useState(null);
  const [response,setResponse]=useState("");
  const [generating,setGenerating]=useState(false);
  const [editing,setEditing]=useState(false);

  const gen=async(r)=>{
    setSelected(r);setGenerating(true);setResponse("");setEditing(false);
    const t=await callClaude(
      `You are Echo, an AI reputation manager for a ${sector} business. Write a genuine human response. 1-2 star: empathetic, take responsibility, offer resolution, invite them to reconsider. 4-5 star: warm thanks, encourage referrals. Under 75 words. Sound real, not corporate.`,
      `${r.rating}-star review on ${r.platform} for a ${sector} business: "${r.text}"`
    );
    setResponse(t);setGenerating(false);
  };

  return(
    <div className="fade">
      <SectionHeader title="Review Manager · Echo" sub={`AI reputation management for ${sector}`}/>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:12,marginBottom:20}}>
        <Stat label="Avg Rating" value="4.6" sub="last 30 days" color={C.blue}/>
        <Stat label="Reviews Mo." value="18" sub="7 from AI" color={C.green}/>
        <Stat label="Negatives" value="3/3" sub="100% handled"/>
        <Stat label="Texts Sent" value="47" sub="post-service"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:16}}>
        <div className="card">
          <div style={{fontWeight:700,color:C.text,marginBottom:14}}>Review Inbox — {sector}</div>
          {reviews.map((r,i)=>(
            <div key={i} style={{padding:"12px 0",borderBottom:`1px solid ${C.border}`,cursor:"pointer",background:selected?.author===r.author?C.border+"44":"transparent",borderRadius:selected?.author===r.author?8:0,padding:selected?.author===r.author?"12px 10px":"12px 0",transition:"all .2s"}} onClick={()=>gen(r)}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:5}}>
                <div style={{display:"flex",gap:9,alignItems:"center"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:C.text,flexShrink:0}}>{r.author[0]}</div>
                  <div><div style={{fontSize:12,color:C.text,fontWeight:600}}>{r.author}</div><div style={{fontSize:10,color:C.muted}}>{r.platform}</div></div>
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
                  <div style={{color:r.rating>=4?C.green:r.rating>=3?C.orange:C.red,fontWeight:700,fontSize:13}}>{"★".repeat(r.rating)}{"☆".repeat(5-r.rating)}</div>
                  <Tag color={r.neg?C.red:C.green}>{r.status}</Tag>
                </div>
              </div>
              <p style={{fontSize:12,color:C.muted,lineHeight:1.5}}>{r.text}</p>
            </div>
          ))}
        </div>
        <div className="card">
          <div style={{fontWeight:700,color:C.text,marginBottom:14}}>Echo's Response</div>
          {selected?(
            <div>
              <div style={{background:C.bg,borderRadius:9,padding:12,marginBottom:12}}>
                <div style={{fontSize:10,color:C.muted,marginBottom:3}}>{selected.author} · {"★".repeat(selected.rating)} · {selected.platform}</div>
                <p style={{fontSize:12,color:C.muted,fontStyle:"italic"}}>"{selected.text}"</p>
              </div>
              {generating?<div style={{display:"flex",gap:9,alignItems:"center",color:C.muted,fontSize:13}}><Spinner size={15} color={C.green}/>Echo crafting response...</div>:(
                <div>
                  {editing?(
                    <div style={{marginBottom:12}}>
                      <textarea
                        value={response}
                        onChange={e=>setResponse(e.target.value)}
                        rows={5}
                        style={{width:"100%",background:C.bg,border:`1px solid ${C.purple}`,borderRadius:9,padding:"11px 14px",fontSize:13,color:C.text,fontFamily:"'Outfit',sans-serif",outline:"none",resize:"vertical",lineHeight:1.6}}
                      />
                      <button className="btn" style={{fontSize:12,marginTop:8,borderColor:C.purple,color:C.purple}} onClick={()=>setEditing(false)}>Done Editing</button>
                    </div>
                  ):(
                    <div style={{fontSize:13,color:C.text,lineHeight:1.7,background:C.bg,padding:13,borderRadius:9,marginBottom:12}}>{response}</div>
                  )}
                  <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                    <button className="btn-p" style={{fontSize:12,padding:"8px 14px"}} onClick={()=>{setEditing(false);toast("Response posted to "+selected.platform+"! Echo will monitor for follow-up.", C.green);}}>Post Response</button>
                    <button className="btn" style={{fontSize:12,borderColor:editing?C.purple:C.borderHi,color:editing?C.purple:C.muted}} onClick={()=>setEditing(e=>!e)}>{editing?"Done":"Edit"}</button>
                    <button className="btn" style={{fontSize:12}} onClick={()=>gen(selected)}>Regenerate</button>
                  </div>
                  {selected.rating<=2&&(
                    <div style={{marginTop:12,background:C.orange+"11",border:`1px solid ${C.orange}33`,borderRadius:9,padding:12}}>
                      <div style={{fontSize:10,color:C.orange,fontWeight:800,marginBottom:4,textTransform:"uppercase",letterSpacing:".06em"}}>Containment Strategy</div>
                      <p style={{fontSize:12,color:C.muted}}>Echo recommends a private offer — complimentary service or discount — to encourage the reviewer to update their rating.</p>
                      <button className="btn" style={{marginTop:8,fontSize:11,padding:"5px 11px",color:C.orange,borderColor:C.orange}} onClick={()=>toast("Private offer sent to "+selected.author+" via DM. Echo follows up in 48h if no reply.", C.orange)}>Send Private Offer</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          ):<div style={{textAlign:"center",paddingTop:52,color:C.muted,fontSize:13}}>Click a review to generate Echo's response</div>}
        </div>
      </div>
    </div>
  );
}

          <div style={{fontWeight:700,color:C.text,marginBottom:14}}>Top Posts — {sector}</div>
          {posts.slice(0,3).map((p,i)=>{
            const recColor=p.rec==="Boost Now"?C.green:p.rec==="Recommended"?C.blue:p.rec==="Consider"?C.orange:C.muted;
            return(
              <div key={i} style={{padding:"11px 0",borderBottom:`1px solid ${C.border}`}}>
                <div style={{display:"flex",gap:11,alignItems:"flex-start"}}>
                  {/* Inline thumbnail */}
                  <div style={{width:60,height:44,borderRadius:8,overflow:"hidden",flexShrink:0,border:`1px solid ${C.border}`,position:"relative"}}>
                    <Photo sector={sector} idx={p.imgIdx||0} style={{position:"absolute",inset:0}} alt={sector}/>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,flexWrap:"wrap",gap:4}}>
                      <span style={{fontSize:12,color:C.text,fontWeight:600}}>{p.platform} · {p.type}</span>
                      <Tag color={recColor}>{p.rec}</Tag>
                    </div>
                    <ScoreBar score={p.score}/>
                    <div style={{fontSize:11,color:C.muted,marginTop:3}}>{p.reach} reach · {p.eng} · CTR {p.ctr}</div>
                    <button className="btn" style={{marginTop:5,fontSize:10,padding:"3px 9px"}} onClick={()=>setViewPost(p)}>View Details</button>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div className="card">
          <div style={{fontWeight:700,color:C.text,marginBottom:14}}>Agent Activity</div>
          {[
            {agent:"Aria",    a:`Generated ${sector} content for TikTok, IG & Facebook`,  t:"2m",color:C.blue},
            {agent:"Maverick",a:"Contacted fresh ad lead — responded in under 2 min",      t:"14m",color:C.purple},
            {agent:"Echo",    a:"Responding to 1-star review, de-escalating",               t:"1h",color:C.green},
            {agent:"Maverick",a:"Re-engaged cold lead after 6 months — booked follow-up",  t:"3h",color:C.purple},
            {agent:"Aria",    a:"Boosted TikTok post — virality score hit 98",              t:"5h",color:C.blue},
          ].map((a,i)=>(
            <div key={i} style={{display:"flex",gap:9,padding:"9px 0",borderBottom:`1px solid ${C.border}`,alignItems:"flex-start"}}>
              <Dot color={a.color} pulse/>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontSize:11,color:a.color,fontWeight:700}}>{a.agent}</span>
                <p style={{fontSize:12,color:C.muted,lineHeight:1.5,marginTop:1}}>{a.a}</p>
              </div>
              <span className="mono" style={{fontSize:10,color:C.dim,flexShrink:0}}>{a.t} ago</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ─── ONBOARDING ─────────────────────────────────── */
/* ─── BUSINESS INFO STEP ─────────────────────────── */
function BusinessInfoStep({user, onDone}){
  const [bizName,setBizName] = useState("");
  const [website,setWebsite] = useState("");
  const [phone,setPhone] = useState("");
  const [city,setCity] = useState("");
  const [sector,setSector] = useState(null);
  const [desc,setDesc] = useState("");

  const proceed = () => { onDone({ bizName, website, phone, city, sector, desc }); };
  const filled = sector !== null;

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#F0F3FF 0%,#F8F4FF 50%,#FFF4F8 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",overflowX:"hidden"}}>
      <style>{G}</style>
      <div style={{width:"100%",maxWidth:580}} className="fade">
        {/* Progress bar */}
        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:32,justifyContent:"center",flexWrap:"wrap"}}>
          {["Account","Business Info","Your Plan","Agents"].map((step,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:6}}>
              <div style={{display:"flex",alignItems:"center",gap:5}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:i===1?C.grad:i<1?"#18B96A":"#E2E6EF",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:"#fff",flexShrink:0}}>{i<1?"✓":i+1}</div>
                <span style={{fontSize:12,fontWeight:i===1?700:500,color:i===1?C.purple:i<1?C.green:C.muted,whiteSpace:"nowrap"}}>{step}</span>
              </div>
              {i<3&&<div style={{width:20,height:1,background:i<1?C.green:C.border}}/>}
            </div>
          ))}
        </div>

        <div style={{background:"#fff",borderRadius:20,padding:32,boxShadow:"0 8px 40px rgba(100,80,200,.12)"}}>
          <div style={{marginBottom:24}}>
            <h2 style={{fontWeight:900,fontSize:24,color:C.text,marginBottom:6}}>Tell us about your business</h2>
            <p style={{fontSize:13,color:C.muted,lineHeight:1.6}}>ProMetra uses this to personalize all content, leads, and agent responses to your specific business.</p>
          </div>

          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:16,marginBottom:20}}>
            <div>
              <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Business Name</label>
              <input className="inp" value={bizName} onChange={e=>setBizName(e.target.value)} placeholder="e.g. ProDetail NJ"/>
            </div>
            <div>
              <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Website (optional)</label>
              <input className="inp" value={website} onChange={e=>setWebsite(e.target.value)} placeholder="https://yoursite.com"/>
            </div>
            <div>
              <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Phone Number (optional)</label>
              <input className="inp" value={phone} onChange={e=>setPhone(e.target.value)} placeholder="(732) 555-0000"/>
            </div>
            <div>
              <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>City / Service Area</label>
              <input className="inp" value={city} onChange={e=>setCity(e.target.value)} placeholder="e.g. Monmouth County, NJ"/>
            </div>
          </div>

          <div style={{marginBottom:20}}>
            <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:10,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Business Niche <span style={{color:C.red}}>*</span></label>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {SECTORS.map(s=>(
                <button key={s} className="btn" onClick={()=>setSector(s)}
                  style={sector===s?{borderColor:C.purple,color:C.purple,background:C.purple+"0F",fontWeight:700}:{}}>
                  {s}
                </button>
              ))}
            </div>
          </div>

          <div style={{marginBottom:24}}>
            <label style={{fontSize:11,color:C.muted,display:"block",marginBottom:6,fontWeight:700,textTransform:"uppercase",letterSpacing:".06em"}}>Short Business Description (optional)</label>
            <textarea className="inp" value={desc} onChange={e=>setDesc(e.target.value)}
              placeholder="e.g. Premium mobile auto detailing serving Monmouth County NJ. Specializing in ceramic coatings and full detail packages."
              rows={3} style={{resize:"vertical",lineHeight:1.6}}/>
          </div>

          <button className="btn-p" disabled={!filled} onClick={proceed} style={{width:"100%",padding:"14px",fontSize:15,borderRadius:11}}>
            Continue — Choose Your Plan →
          </button>
          {!filled&&<p style={{fontSize:11,color:C.muted,textAlign:"center",marginTop:10}}>Select a business niche to continue</p>}
        </div>
      </div>
    </div>
  );
}

function Onboard({onDone, preSector}){
  const [stage,setStage]=useState(preSector ? 1 : 0);
  const [sector,setSector]=useState(preSector || null);
  const [plan,setPlanL]=useState(null);
  const [agentId,setAgentId]=useState(null);

  const wrap=c=>(
    <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#F0F3FF 0%,#F8F4FF 50%,#FFF4F8 100%)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",overflowX:"hidden"}}>
      <style>{G}</style>{c}
    </div>
  );

  if(stage===0)return wrap(
    <div style={{maxWidth:500,width:"100%",textAlign:"center"}} className="fade">
      <div style={{display:"inline-flex",alignItems:"center",gap:12,marginBottom:28}}>
        <div style={{width:36,height:36,borderRadius:10,background:C.grad,flexShrink:0}}/>
        <div style={{fontWeight:900,fontSize:24,background:C.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ProMetra</div>
      </div>
      <h1 style={{fontWeight:900,fontSize:"clamp(24px,5vw,44px)",color:C.text,lineHeight:1.1,marginBottom:12}}>Replace your entire marketing team.</h1>
      <p style={{fontSize:14,color:C.muted,lineHeight:1.75,marginBottom:32}}>Social media, lead gen, and reputation management — all AI-powered from <strong style={{color:C.text}}>$299.99/mo</strong>. <span style={{color:C.green}}>7-day free trial.</span></p>
      <div style={{textAlign:"left",marginBottom:24}}>
        <p style={{fontSize:10,fontWeight:700,color:C.muted,letterSpacing:".1em",marginBottom:10,textTransform:"uppercase"}}>Your industry</p>
        <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
          {SECTORS.map(s=><button key={s} className="btn" onClick={()=>setSector(s)} style={sector===s?{borderColor:C.purple,color:C.purple,background:C.purple+"11"}:{}}>{s}</button>)}
        </div>
      </div>
      <button className="btn-p" disabled={!sector} onClick={()=>setStage(1)} style={{width:"100%",padding:"13px",fontSize:15}}>Start Free Trial</button>
    </div>
  );

  if(stage===1)return wrap(
    <div style={{maxWidth:700,width:"100%"}} className="fade">
      <button className="btn" style={{marginBottom:20}} onClick={()=>setStage(0)}>Back</button>
      <h2 style={{fontWeight:900,fontSize:"clamp(22px,4vw,28px)",color:C.text,marginBottom:6}}>Choose your plan</h2>
      <p style={{color:C.muted,marginBottom:20}}>For your <strong style={{color:C.text}}>{sector}</strong> business — 7-day free trial included.</p>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:16}}>
        {Object.entries(PLANS).map(([k,p])=>(
          <div key={k} onClick={()=>setPlanL(k)} style={{border:`1.5px solid ${plan===k?p.color:C.border}`,borderRadius:12,padding:18,cursor:"pointer",background:plan===k?p.color+"0D":C.surface,transition:"all .2s"}}>
            <Tag color={p.color}>{p.tag}</Tag>
            <div style={{fontWeight:800,fontSize:16,color:C.text,marginTop:10,marginBottom:3}}>{p.name}</div>
            <div className="mono" style={{fontSize:18,color:p.color,marginBottom:10}}>{p.price}{p.price!=="Custom"&&<span style={{fontSize:10,color:C.muted}}>/mo</span>}</div>
            {p.features.map((f,i)=><div key={i} style={{display:"flex",gap:7,marginBottom:4,alignItems:"center"}}><Dot color={p.color}/><span style={{fontSize:11,color:C.muted}}>{f}</span></div>)}
          </div>
        ))}
      </div>
      <button className="btn-p" disabled={!plan} onClick={()=>setStage(2)} style={{width:"100%",padding:"13px",fontSize:15}}>Choose Agents</button>
    </div>
  );

  return wrap(
    <div style={{maxWidth:580,width:"100%"}} className="fade">
      <button className="btn" style={{marginBottom:20}} onClick={()=>setStage(1)}>Back</button>
      <h2 style={{fontWeight:900,fontSize:"clamp(22px,4vw,28px)",color:C.text,marginBottom:6}}>Your AI Agents</h2>
      <p style={{color:C.muted,marginBottom:20}}>Trained for <strong style={{color:C.text}}>{sector}</strong>.</p>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:20}}>
        {AGENTS.map(a=>{
          const locked=plan==="social"&&a.id!=="social";
          const isSel=agentId===a.id;
          return(
            <div key={a.id} onClick={()=>!locked&&setAgentId(a.id)} style={{border:`1.5px solid ${isSel?a.color:C.border}`,borderRadius:12,padding:16,cursor:locked?"not-allowed":"pointer",opacity:locked?.35:1,background:isSel?a.color+"0D":C.surface,display:"flex",gap:14,alignItems:"center",transition:"all .2s"}}>
              <div style={{width:40,height:40,borderRadius:11,background:a.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:800,color:a.color,flexShrink:0}}>{a.name[0]}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",gap:7,alignItems:"center",flexWrap:"wrap",marginBottom:3}}>
                  <span style={{fontWeight:800,fontSize:15,color:C.text}}>{a.name}</span>
                  <Tag color={a.color}>{a.role}</Tag>
                  {locked&&<Tag color={C.muted}>Upgrade</Tag>}
                </div>
                <p style={{fontSize:12,color:C.muted,lineHeight:1.6}}>{a.desc}</p>
              </div>
            </div>
          );
        })}
      </div>
      <button className="btn-p" disabled={!agentId} onClick={()=>onDone(sector,plan,agentId)} style={{width:"100%",padding:"13px",fontSize:15}}>Launch Dashboard</button>
    </div>
  );
}

/* ─── ROOT APP ───────────────────────────────────── */
function App(){
  const [authDone,setAuthDone]=useState(false);
  const [user,setUser]=useState(null);
  const [bizInfo,setBizInfo]=useState(null);  // business info step
  const [ready,setReady]=useState(false);
  const [sector,setSector]=useState(null);
  const [plan,setPlan]=useState(null);
  const [agentId,setAgentId]=useState(null);
  const [nav,setNav]=useState("dashboard");
  const [showSettings,setShowSettings]=useState(false);
  const [sidebarOpen,setSidebarOpen]=useState(false);

  // Step 1: Auth (any input passes)
  if(!authDone) return <AuthPage onAuth={(u)=>{setUser(u);setAuthDone(true);}}/>;

  // Step 2: Business info + niche (new step)
  if(!bizInfo) return <BusinessInfoStep user={user} onDone={(info)=>{setBizInfo(info);setSector(info.sector);}}/>;

  // Step 3: Plan + agent onboarding (sector pre-filled from bizInfo)
  if(!ready) return <Onboard preSector={bizInfo.sector} onDone={(s,p,a)=>{setSector(s);setPlan(p);setAgentId(a);setReady(true);}}/>;

  const canAccess=n=>!n.locked||!n.locked.includes(plan);

  return(
    <div style={{display:"flex",height:"100vh",background:C.bg,overflow:"hidden"}}>
      <style>{G}</style>
      <ToastProvider/>

      {showSettings&&(
        <SettingsModal sector={sector} plan={plan} onClose={()=>setShowSettings(false)}
          onSave={(s,p)=>{setSector(s);setPlan(p);setShowSettings(false);}}/>
      )}

      {/* Mobile overlay */}
      {sidebarOpen&&<div onClick={()=>setSidebarOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:800}}/>}

      {/* SIDEBAR */}
      <div className={`sidebar${sidebarOpen?" open":""}`}
        style={{width:196,minWidth:196,background:C.surface,borderRight:`1px solid ${C.border}`,padding:"18px 9px",display:"flex",flexDirection:"column",flexShrink:0,height:"100vh",overflowY:"auto",zIndex:850}}>
        <div style={{padding:"0 5px",marginBottom:20}}>
          <div style={{fontWeight:900,fontSize:17,background:C.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ProMetra</div>
          <div className="mono" style={{fontSize:9,color:C.muted,marginTop:1,letterSpacing:".08em"}}>{PLANS[plan]?.tag?.toUpperCase()} PLAN</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:2,flex:1}}>
          {NAV.map(n=>(
            <div key={n.id} className={`nav-item${nav===n.id?" active":""}${!canAccess(n)?" locked":""}`}
              onClick={()=>{if(canAccess(n)){setNav(n.id);setSidebarOpen(false);}}}>
              {n.label}
              {!canAccess(n)&&<span style={{marginLeft:"auto",fontSize:9,color:C.dim}}>locked</span>}
            </div>
          ))}
        </div>
        <div style={{paddingTop:12,borderTop:`1px solid ${C.border}`}}>
          <div style={{fontSize:9,color:C.muted,fontWeight:700,letterSpacing:".1em",marginBottom:7,padding:"0 3px",textTransform:"uppercase"}}>Agents</div>
          {AGENTS.filter(a=>plan==="enterprise"||(plan==="growth"&&a.id!=="review")||(plan==="social"&&a.id==="social")).map(a=>(
            <div key={a.id} style={{display:"flex",alignItems:"center",gap:7,padding:"5px 3px",marginBottom:2}}>
              <Dot color={a.color} pulse/><span style={{fontSize:11,color:C.muted}}>{a.name}</span>
              <span style={{fontSize:9,color:a.color,marginLeft:"auto"}}>live</span>
            </div>
          ))}
          <div style={{fontSize:10,color:C.muted,marginTop:10,padding:"0 3px",marginBottom:4}}>
            {user?.name&&<span>Hi, <strong style={{color:C.text}}>{user.name.split(" ")[0]}</strong></span>}
          </div>
          <button className="btn" style={{width:"100%",fontSize:11,padding:"6px"}} onClick={()=>setShowSettings(true)}>Settings</button>
        </div>
      </div>

      {/* MAIN */}
      <div className="main-wrap" style={{flex:1,overflowY:"auto",overflowX:"hidden",minWidth:0,height:"100vh"}}>
        {/* Mobile header */}
        <div className="mob-header">
          <button onClick={()=>setSidebarOpen(true)} style={{background:"none",border:`1px solid ${C.borderHi}`,borderRadius:7,padding:"7px 10px",cursor:"pointer",color:C.muted,display:"flex",flexDirection:"column",gap:4}}>
            <div style={{width:16,height:2,background:C.muted,borderRadius:2}}/>
            <div style={{width:16,height:2,background:C.muted,borderRadius:2}}/>
            <div style={{width:16,height:2,background:C.muted,borderRadius:2}}/>
          </button>
          <div style={{fontWeight:900,fontSize:16,background:C.grad,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>ProMetra</div>
          <div style={{flex:1}}/>
          <button className="btn" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>setShowSettings(true)}>Settings</button>
        </div>

        <div style={{padding:"clamp(14px,2.5vw,32px)"}}>
          {nav==="dashboard"&&<Dashboard sector={sector} plan={plan} agentId={agentId} onOpenSettings={()=>setShowSettings(true)}/>}
          {nav==="studio"   &&<StudioSection sector={sector}/>}
          {nav==="leads"    &&<LeadsSection sector={sector}/>}
          {nav==="reviews"  &&<ReviewsSection sector={sector}/>}
          {nav==="analytics"&&<AnalyticsSection sector={sector}/>}
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
  </script>
</body>
</html>
